<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Quote of the Day</title>
    <style>
      :root {
        --bg: #fefefe;
        --text: #333;
        --accent: #555;
        --font: "Georgia", serif;
      }

      body {
        background: var(--bg);
        color: var(--text);
        font-family: var(--font);
        display: flex;
        justify-content: center;
        align-items: center;
        height: 100vh;
        margin: 0;
      }

      .container {
        max-width: 500px;
        padding: 2em;
        background: white;
        border-radius: 16px;
        box-shadow: 0 10px 30px rgba(0, 0, 0, 0.1);
        text-align: center;
        transition: 0.3s ease all;
      }

      .quote {
        font-size: 1.3em;
        font-weight: 500;
        margin-bottom: 1em;
        line-height: 1.4;
      }

      .author {
        font-size: 1em;
        color: var(--accent);
        font-style: italic;
      }

      @media (max-width: 600px) {
        .container {
          margin: 1em;
          padding: 1.5em;
        }
        .quote {
          font-size: 1.2em;
        }
      }
    </style>
  </head>
  <body>
    <div class="container">
      <div class="quote" id="quote"></div>
      <div class="author" id="author"></div>
    </div>

    <script>
      const quotes = [
        {
          text: "Be yourself; everyone else is already taken.",
          author: "Oscar Wilde",
        },
        {
          text: "The Road goes ever on and on\n\
                Down from the door where it began.\n\
                Now far ahead the Road has gone,\n\
                And I must follow, if I can,\n\
                Pursuing it with eager feet,\n\
                Until it joins some larger way\n\
                Where many paths and errands meet.\n\
                And whither then? I cannot say.",
          author: "The Hobbit, J.R.R.Tolkien",
        },
        {
          text: "All that is gold does not glitter,\n\
              Not all those who wander are lost;\n\
              The old that is strong does not wither,\n\
              Deep roots are not reached by the frost.\n\
              From the ashes a fire shall be woken,\n\
              A light from the shadows shall spring;\n\
              Renewed shall be blade that was broken,\n\
              The crownless again shall be king.",
          author: "The Fellowship of the Ring, J.R.R.Tolkien",
        },
        {
          text: "Three Rings for the Elven-kings under the sky,\n\
              Seven for the Dwarf-lords in their halls of stone,\n\
              Nine for Mortal Men, doomed to die,\n\
              One for the Dark Lord on his dark throne\n\
              In the Land of Mordor where the Shadows lie.\n\
              One Ring to rule them all, One Ring to find them,\n\
              One Ring to bring them all and in the darkness bind them.\n\
              In the Land of Mordor where the Shadows lie.",
          author: "The Fellowship of the Ring, J.R.R.Tolkien",
        },
        {
          text: "This being human is a guest house.\n\
              Every morning a new arrival.\n\
              \n\
              A joy, a depression, a meanness,\n\
              some momentary awareness comes\n\
              as an unexpected visitor.\n\
              \n\
              Welcome and entertain them all!\n\
              Even if they’re a crowd of sorrows,\n\
              who violently sweep your house\n\
              empty of its furniture,\n\
              still, treat each guest honorably.\n\
              He may be clearing you out\n\
              for some new delight.\n\
              \n\
              The dark thought, the shame, the malice,\n\
              meet them at the door laughing,\n\
              and invite them in.\n\
              \n\
              Be grateful for whoever comes,\n\
              because each has been sent\n\
              as a guide from beyond.",
          author: "Rumi Jalaluddin",
        },
        {
          text: "Для чайных кустов\n\
              Сборщица листа - словно\n\
              Ветер осени.",
          author: "Мацуо Басё",
        },
        {
          text: "Зло, утверждали даосы, появляется в тот момент, когда начинают призывать делать добро ради добра.",
          author: "Чжуан-цзы, Предисловие",
        },
        {
          text: "Весной - сотни цветов.\n\
              Осенью - луна.\n\
              Летом - прохладный ветер.\n\
              Зимой - снега.\n\
              Если не будешь утруждать ум пустяками,\n\
              Всякое время станет прекрасной порой.",
          author: "Умэнь Хуэй",
        },
        {
          text: "Китайцы никогда не приписывали художнику роль переводчика языка природы на язык человека и не предполагали, что природа ждут своего воплощения в слове. Да и как она может чего-то желать, если она непрерывно перерастает самое себя? В этой непосредственности предполагаемого людская речь и журчание реки навевают одно и то же.",
          author: "Чжуан-цзы, Предисловие",
        }
      ];

      const today = new Date();
      const index = today.getDate() % quotes.length;
      const quote = quotes[index];

      document.getElementById("quote").innerHTML = quote.text.replace(
        /\n/g,
        "<br>"
      );
      document.getElementById("author").textContent = `— ${quote.author}`;
    </script>
  </body>
</html>
